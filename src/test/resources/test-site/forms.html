<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forms Test Page</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        #form-result { margin-top: 20px; padding: 12px; border: 1px solid #ccc; background: #f9f9f9; min-height: 40px; }
    </style>
</head>
<body>
    <h1>Forms Test Page</h1>

    <form id="test-form">
        <!-- Text input -->
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username">
        </div>

        <!-- Password input -->
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password">
        </div>

        <!-- Textarea -->
        <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="3" cols="40" placeholder="Tell us about yourself"></textarea>
        </div>

        <!-- Select dropdown -->
        <div class="field">
            <label for="color">Favorite Color</label>
            <select id="color" name="color">
                <option value="">-- Select --</option>
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="blue">Blue</option>
                <option value="yellow">Yellow</option>
            </select>
        </div>

        <!-- Checkbox (unchecked by default) -->
        <div class="field">
            <label>
                <input type="checkbox" id="agree" name="agree"> I agree to the terms
            </label>
        </div>

        <!-- Checkbox (checked by default) -->
        <div class="field">
            <label>
                <input type="checkbox" id="newsletter" name="newsletter" checked> Subscribe to newsletter
            </label>
        </div>

        <!-- Radio button group -->
        <div class="field">
            <label>Preferred contact method:</label>
            <label><input type="radio" name="contact" value="email"> Email</label>
            <label><input type="radio" name="contact" value="phone"> Phone</label>
            <label><input type="radio" name="contact" value="sms"> SMS</label>
        </div>

        <!-- Pre-filled text input (for testing clear()) -->
        <div class="field">
            <label for="prefilled">Pre-filled Field</label>
            <input type="text" id="prefilled" name="prefilled" value="initial value">
        </div>

        <!-- Email input (for extra type-testing surface) -->
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com">
        </div>

        <!-- Number input -->
        <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="0" max="150">
        </div>

        <!-- Submit button -->
        <div class="field">
            <button type="submit" id="submit-btn">Submit</button>
        </div>
    </form>

    <div id="form-result">No submission yet.</div>

    <script>
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();

            var fd = new FormData(this);
            var result = {};
            fd.forEach(function(value, key) {
                result[key] = value;
            });

            // Capture checkboxes explicitly (FormData omits unchecked)
            result['agree'] = document.getElementById('agree').checked ? 'on' : 'off';
            result['newsletter'] = document.getElementById('newsletter').checked ? 'on' : 'off';

            document.getElementById('form-result').textContent = JSON.stringify(result);
        });

        // Track key events for testing pressKey
        window.lastKeyDown = null;
        document.addEventListener('keydown', function(e) {
            window.lastKeyDown = e.key;
        });
    </script>
</body>
</html>
